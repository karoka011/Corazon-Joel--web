<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Postulantes — Arrulladoras</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">
</head>

<body class="panel-body">

    <!-- Vista de login -->
    <div id="login-box" class="panel-login">
        <img src="img/logo-icono.png" alt="Arrulladoras" class="panel-login__logo">
        <h1 class="panel-login__titulo">Panel de administración</h1>
        <p class="panel-login__subtitulo">Corazón Joel de Jesús — Arrulladoras</p>

        <input type="email" id="login-email" placeholder="Correo" class="panel-input">
        <input type="password" id="login-pass" placeholder="Contraseña" class="panel-input">
        <button id="btn-login" class="panel-btn panel-btn--primario">Entrar</button>
        <p id="login-error" class="panel-login__error"></p>
    </div>


    <!-- Vista del panel -->
    <div id="panel-box" class="panel-contenido">
        <header class="panel-header">
            <h1>Postulantes — Convocatoria 2026</h1>
            <button id="btn-logout" class="panel-btn panel-btn--secundario">Cerrar sesión</button>
        </header>

        <div class="panel-filtros">
            <select id="filtro-hospital" class="panel-select">
                <option value="">Todos los hospitales</option>
            </select>

            <select id="filtro-estado" class="panel-select">
                <option value="">Todos los estados</option>
                <option value="pendiente">Pendiente</option>
                <option value="preseleccionado">Preseleccionado</option>
                <option value="entrevistado">Entrevistado</option>
                <option value="aprobado">Aprobado</option>
                <option value="rechazado">Rechazado</option>
            </select>

            <span id="contador-resultados" class="panel-contador"></span>
        </div>

        <div class="panel-tabla-wrap">
            <table class="panel-tabla">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Edad</th>
                        <th>Hospital</th>
                        <th>Disponibilidad</th>
                        <th>Celular</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla-postulantes"></tbody>
            </table>
            <p id="sin-resultados" class="panel-sin-resultados" style="display:none;">
                No hay postulantes con esos filtros.
            </p>
        </div>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/panel.js"></script>
</body>

</html>
